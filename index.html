<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StoryFrame — Gerador de Storyboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
      --accent: #e8d5a3; --accent2: #c4a882; --text: #f0ece4; --muted: #7a7570;
      --danger: #e06c5a; --green: #7ec8a0; --frame-bg: #111;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(13,13,13,0.95); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
    .logo span { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 2px; margin-left: 12px; vertical-align: middle; }
    .header-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; }
    main { max-width: 1200px; margin: 0 auto; padding: 60px 40px; }
    .hero { margin-bottom: 60px; animation: fadeUp 0.6s ease both; }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 8vw, 96px); line-height: 0.9; letter-spacing: 2px; color: var(--text); margin-bottom: 16px; }
    .hero h1 em { font-style: normal; color: var(--accent); -webkit-text-stroke: 1px var(--accent2); }
    .hero p { color: var(--muted); font-size: 15px; max-width: 500px; line-height: 1.7; }
    .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 32px; margin-bottom: 40px; animation: fadeUp 0.6s 0.1s ease both; position: relative; }
    .input-section::before { content: 'NARRATIVA'; position: absolute; top: -10px; left: 24px; background: var(--surface); padding: 0 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 2px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .field select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; border-radius: 2px; outline: none; transition: border-color 0.2s; appearance: none; cursor: pointer; }
    .field select:focus { border-color: var(--accent); }
    textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.7; border-radius: 2px; resize: vertical; min-height: 140px; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .char-counter { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 20px; letter-spacing: 1px; }
    .btn-row { display: flex; gap: 12px; }
    .btn-generate { flex: 1; background: var(--accent); color: #0d0d0d; border: none; padding: 14px 32px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; border-radius: 2px; transition: background 0.2s, transform 0.1s; }
    .btn-generate:hover { background: var(--accent2); }
    .btn-generate:active { transform: scale(0.99); }
    .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 14px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
    .status { display: none; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 2px; font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 1px; margin-bottom: 30px; }
    .status.loading { display: flex; background: rgba(232,213,163,0.08); color: var(--accent); border: 1px solid rgba(232,213,163,0.2); }
    .status.error { display: flex; background: rgba(224,108,90,0.08); color: var(--danger); border: 1px solid rgba(224,108,90,0.2); }
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(232,213,163,0.2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
    #output { display: none; animation: fadeUp 0.5s ease both; }
    .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .output-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--accent); }
    .output-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
    .btn-export { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 20px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-export:hover { background: var(--accent); color: #0d0d0d; }
    .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .scene-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; animation: fadeUp 0.4s ease both; transition: border-color 0.2s, transform 0.2s; }
    .scene-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .frame-visual { aspect-ratio: 16/9; background: var(--frame-bg); position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
    .frame-number { position: absolute; top: 10px; left: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: rgba(232,213,163,0.3); letter-spacing: 1px; z-index: 2; }
    .frame-shot-type { position: absolute; bottom: 10px; right: 12px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent); background: rgba(13,13,13,0.7); padding: 3px 8px; border-radius: 2px; text-transform: uppercase; z-index: 2; }
    .frame-drawing { position: absolute; inset: 0; }
    .frame-drawing svg { width: 100%; height: 100%; }
    .scene-info { padding: 16px 18px; }
    .scene-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--text); margin-bottom: 8px; }
    .scene-description { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .scene-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .meta-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; }
    .tag-transition { background: rgba(126,200,160,0.1); color: var(--green); border: 1px solid rgba(126,200,160,0.2); }
    .tag-camera { background: rgba(232,213,163,0.08); color: var(--accent); border: 1px solid rgba(232,213,163,0.15); }
    .tag-duration { background: rgba(122,117,112,0.1); color: var(--muted); border: 1px solid var(--border); }
    .scene-ambiente { margin-top: 8px; font-size: 12px; color: var(--muted); opacity: 0.7; }
    .powered-by { text-align: center; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 2px; margin-top: 8px; opacity: 0.5; }
    @media print {
      body { background: white; color: black; }
      header, .input-section, .status, .btn-export { display: none !important; }
      .scene-card { border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
      .frame-visual { background: #f0f0f0; }
      #output { display: block !important; }
      .print-header { display: block !important; margin-bottom: 24px; }
    }
    .print-header { display: none; border-bottom: 2px solid #000; padding-bottom: 12px; margin-bottom: 24px; }
    .print-header h2 { font-size: 28px; margin-bottom: 4px; font-family: sans-serif; }
    .print-header p { font-size: 12px; color: #666; font-family: sans-serif; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 768px) { main { padding: 40px 20px; } header { padding: 16px 20px; } .input-row { grid-template-columns: 1fr; } .storyboard-grid { grid-template-columns: 1fr; } .btn-row { flex-direction: column; } }
  </style>
</head>
<body>
<header>
  <div class="logo">StoryFrame <span>v1.0</span></div>
  <div class="header-badge">IPVC · ESTG · ECGM</div>
</header>
<main>
  <div class="hero">
    <h1>GERA O TEU<br><em>STORYBOARD</em></h1>
    <p>Descreve a tua narrativa e a IA estrutura automaticamente as cenas, enquadramentos e transições cinematográficas.</p>
  </div>
  <div class="input-section">
    <div class="input-row">
      <div class="field">
        <label>Género</label>
        <select id="genre">
          <option value="cinematográfico">Cinematográfico</option>
          <option value="documental">Documental</option>
          <option value="publicidade">Publicidade</option>
          <option value="videoclip">Videoclip</option>
          <option value="animação">Animação</option>
          <option value="videojogo">Videojogo / Cutscene</option>
          <option value="série TV">Série TV</option>
          <option value="curta-metragem">Curta-Metragem</option>
          <option value="institucional">Institucional</option>
        </select>
      </div>
      <div class="field">
        <label>Número de Cenas</label>
        <select id="numScenes">
          <option value="4">4 cenas</option>
          <option value="6" selected>6 cenas</option>
          <option value="8">8 cenas</option>
          <option value="10">10 cenas</option>
        </select>
      </div>
    </div>
    <textarea id="narrative" placeholder="Ex: Uma detetive recebe uma carta misteriosa escrita por ela mesma há 20 anos, descrevendo com detalhe o crime que está a investigar hoje..." oninput="updateCounter()"></textarea>
    <div class="char-counter"><span id="charCount">0</span> / 500 CARACTERES</div>
    <div class="btn-row">
      <button class="btn-generate" id="generateBtn" onclick="generateStoryboard()">GERAR STORYBOARD</button>
      <button class="btn-clear" onclick="clearForm()">LIMPAR</button>
    </div>
    <div class="powered-by">POWERED BY GROQ AI · LLAMA 3.3</div>
  </div>
  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <span id="statusText">A gerar storyboard com IA...</span>
  </div>
  <div id="output">
    <div class="print-header">
      <h2 id="printTitle">STORYBOARD</h2>
      <p id="printMeta"></p>
    </div>
    <div class="output-header">
      <div>
        <div class="output-title">STORYBOARD</div>
        <div class="output-meta" id="outputMeta"></div>
      </div>
      <button class="btn-export" onclick="window.print()">EXPORTAR / IMPRIMIR</button>
    </div>
    <div class="storyboard-grid" id="storyboardGrid"></div>
  </div>
</main>
<script>
  // Substitui pela tua API key do Groq (console.groq.com)
  var GROQ_API_KEY = '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';

  var shotSVGs = {
    'Plano Geral': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="15" width="280" height="150" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><line x1="20" y1="130" x2="300" y2="130" stroke="#e8d5a3" stroke-width="1" opacity="0.25"/><ellipse cx="160" cy="100" rx="15" ry="18" fill="none" stroke="#e8d5a3" stroke-width="1" opacity="0.35"/><path d="M100 130 Q120 90 145 85 Q175 90 220 130" fill="none" stroke="#e8d5a3" stroke-width="1" opacity="0.3"/><path d="M20 70 Q80 50 160 55 Q240 50 300 70" fill="none" stroke="#e8d5a3" stroke-width="0.8" opacity="0.2"/></svg>',
    'Plano Médio': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="60" y="20" width="200" height="140" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><ellipse cx="160" cy="70" rx="28" ry="32" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><path d="M110 140 Q130 100 160 95 Q190 100 210 140" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.35"/></svg>',
    'Grande Plano': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="80" y="30" width="160" height="120" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><ellipse cx="160" cy="75" rx="40" ry="45" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><circle cx="160" cy="62" r="20" fill="none" stroke="#e8d5a3" stroke-width="1" opacity="0.35"/></svg>',
    'Plano Detalhe': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="100" y="50" width="120" height="80" rx="2" fill="none" stroke="#e8d5a3" stroke-width="2" opacity="0.4"/><circle cx="160" cy="90" r="28" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><line x1="135" y1="90" x2="185" y2="90" stroke="#e8d5a3" stroke-width="1" opacity="0.3"/><line x1="160" y1="65" x2="160" y2="115" stroke="#e8d5a3" stroke-width="1" opacity="0.3"/></svg>',
    'Plano Picado': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="25" width="240" height="130" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><ellipse cx="160" cy="120" rx="55" ry="22" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.35"/><path d="M130 120 L160 55 L190 120" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/></svg>',
    'Plano Contrapicado': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="40" y="25" width="240" height="130" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><path d="M130 40 L160 135 L190 40" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><ellipse cx="160" cy="38" rx="55" ry="20" fill="none" stroke="#e8d5a3" stroke-width="1" opacity="0.3"/></svg>',
    'Plano Americano': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="50" y="20" width="220" height="140" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><ellipse cx="160" cy="60" rx="25" ry="28" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><path d="M115 140 Q135 95 160 88 Q185 95 205 140" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.35"/><line x1="115" y1="115" x2="205" y2="115" stroke="#e8d5a3" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,4"/></svg>',
    'Plano Sequência': '<svg viewBox="0 0 320 180" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="15" width="280" height="150" rx="2" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.3"/><path d="M40 140 Q80 80 120 100 Q160 120 200 70 Q240 30 280 90" fill="none" stroke="#e8d5a3" stroke-width="1.5" opacity="0.4"/><circle cx="40" cy="140" r="4" fill="#e8d5a3" opacity="0.3"/><circle cx="280" cy="90" r="4" fill="#e8d5a3" opacity="0.3"/></svg>'
  };

  function getSVGForScene(shotType) {
    return shotSVGs[shotType] || shotSVGs['Plano Médio'];
  }

  function updateCounter() {
    document.getElementById('charCount').textContent = document.getElementById('narrative').value.length;
  }

  function clearForm() {
    document.getElementById('narrative').value = '';
    document.getElementById('charCount').textContent = '0';
    document.getElementById('genre').selectedIndex = 0;
    document.getElementById('numScenes').selectedIndex = 1;
    document.getElementById('output').style.display = 'none';
    hideStatus();
  }

  async function generateStoryboard() {
    var narrative = document.getElementById('narrative').value.trim();
    var genre = document.getElementById('genre').value;
    var numScenes = document.getElementById('numScenes').value;

    if (!narrative) { showStatus('error', 'Escreve uma narrativa primeiro.'); return; }

    var btn = document.getElementById('generateBtn');
    btn.disabled = true;
    document.getElementById('output').style.display = 'none';
    showStatus('loading', 'A gerar storyboard com Groq AI...');

    var prompt = 'És um especialista em storyboards cinematográficos. Cria um storyboard com exatamente ' + numScenes + ' cenas para o género "' + genre + '" baseado nesta narrativa: "' + narrative + '". Responde APENAS com JSON válido, sem markdown, sem backticks, sem texto extra. Usa este formato exato: {"titulo":"Título do Storyboard","cenas":[{"numero":1,"titulo":"Título da cena","descricao":"Descrição visual detalhada e específica para esta narrativa em 2 frases","tipo_plano":"Plano Geral","movimento_camara":"Fixo","transicao":"Corte","duracao":"5s","ambiente":"Descrição de luz e ambiente específica para esta cena"}]}. Tipos de plano permitidos: Plano Geral, Plano Médio, Grande Plano, Plano Detalhe, Plano Picado, Plano Contrapicado, Plano Americano. As descrições devem ser únicas e específicas para a narrativa fornecida. Cria exatamente ' + numScenes + ' cenas.';

    try {
      var response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + GROQ_API_KEY
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.8,
          max_tokens: 3000
        })
      });

      if (!response.ok) {
        var errData = await response.json();
        throw new Error(errData.error ? errData.error.message : 'Erro na API Groq');
      }

      var data = await response.json();
      var rawText = data.choices[0].message.content;
      var jsonText = rawText
  .replace(/```json\n?/g, '').replace(/```\n?/g, '')
  .replace(/[\u201C\u201D]/g, '"')
  .replace(/[\u2018\u2019]/g, "'")
  .trim();
      var jsonMatch = jsonText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) throw new Error('Resposta inválida — tenta novamente');

      var parsed = JSON.parse(jsonMatch[0]);
      if (!parsed.cenas || !Array.isArray(parsed.cenas)) throw new Error('Formato inesperado — tenta novamente');

      hideStatus();
      renderStoryboard(parsed, genre, narrative);

    } catch (err) {
      showStatus('error', 'Erro: ' + err.message);
    } finally {
      btn.disabled = false;
    }
  }

  function renderStoryboard(data, genre, narrative) {
    var grid = document.getElementById('storyboardGrid');
    var output = document.getElementById('output');
    var meta = document.getElementById('outputMeta');
    var dateStr = new Date().toLocaleDateString('pt-PT');

    grid.innerHTML = '';
    meta.textContent = data.cenas.length + ' CENAS · ' + genre.toUpperCase() + ' · ' + dateStr;
    document.getElementById('printTitle').textContent = narrative.substring(0, 60) + (narrative.length > 60 ? '...' : '');
    document.getElementById('printMeta').textContent = data.cenas.length + ' cenas · ' + genre.toUpperCase() + ' · ' + dateStr;

    data.cenas.forEach(function(cena, i) {
      var card = document.createElement('div');
      card.className = 'scene-card';
      card.style.animationDelay = (i * 0.07) + 's';
      card.innerHTML =
        '<div class="frame-visual">' +
          '<div class="frame-number">' + String(cena.numero).padStart(2,'0') + '</div>' +
          '<div class="frame-drawing">' + getSVGForScene(cena.tipo_plano) + '</div>' +
          '<div class="frame-shot-type">' + (cena.tipo_plano || 'Plano') + '</div>' +
        '</div>' +
        '<div class="scene-info">' +
          '<div class="scene-title">' + cena.titulo + '</div>' +
          '<div class="scene-description">' + cena.descricao + '</div>' +
          '<div class="scene-meta">' +
            (cena.transicao ? '<span class="meta-tag tag-transition">' + cena.transicao + '</span>' : '') +
            (cena.movimento_camara ? '<span class="meta-tag tag-camera">' + cena.movimento_camara + '</span>' : '') +
            (cena.duracao ? '<span class="meta-tag tag-duration">' + cena.duracao + '</span>' : '') +
          '</div>' +
          (cena.ambiente ? '<div class="scene-ambiente">💡 ' + cena.ambiente + '</div>' : '') +
        '</div>';
      grid.appendChild(card);
    });

    output.style.display = 'block';
    output.scrollIntoView({ behavior: 'smooth' });
  }

  function showStatus(type, msg) {
    var el = document.getElementById('status');
    el.className = 'status ' + type;
    document.getElementById('statusText').textContent = msg;
    document.getElementById('spinner').style.display = type === 'loading' ? 'block' : 'none';
  }

  function hideStatus() {
    var el = document.getElementById('status');
    el.className = 'status';
    el.style.display = 'none';
  }

  document.addEventListener('DOMContentLoaded', function() {
    document.getElementById('narrative').addEventListener('keydown', function(e) {
      if (e.ctrlKey && e.key === 'Enter') generateStoryboard();
    });
  });
</script>
</body>
</html>
