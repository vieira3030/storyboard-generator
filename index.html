<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StoryFrame — Gerador de Storyboards</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
      --accent: #e8d5a3; --accent2: #c4a882; --text: #f0ece4; --muted: #7a7570;
      --danger: #e06c5a; --green: #7ec8a0; --frame-bg: #111;
    }
    html, body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; overflow-x: hidden; }
    header { border-bottom: 1px solid var(--border); padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(13,13,13,0.95); backdrop-filter: blur(12px); z-index: 100; }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--accent); }
    .logo span { color: var(--muted); font-size: 12px; font-family: 'DM Mono', monospace; letter-spacing: 2px; margin-left: 12px; vertical-align: middle; }
    .header-badge { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); border: 1px solid var(--border); padding: 4px 10px; border-radius: 2px; letter-spacing: 1px; }
    main { max-width: 1200px; margin: 0 auto; padding: 60px 40px; }
    .hero { margin-bottom: 60px; animation: fadeUp 0.6s ease both; }
    .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 8vw, 96px); line-height: 0.9; letter-spacing: 2px; color: var(--text); margin-bottom: 16px; }
    .hero h1 em { font-style: normal; color: var(--accent); -webkit-text-stroke: 1px var(--accent2); }
    .hero p { color: var(--muted); font-size: 15px; max-width: 500px; line-height: 1.7; }
    .input-section { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 32px; margin-bottom: 40px; animation: fadeUp 0.6s 0.1s ease both; position: relative; }
    .input-section::before { content: 'NARRATIVA'; position: absolute; top: -10px; left: 24px; background: var(--surface); padding: 0 8px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 2px; }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; }
    .field select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; font-family: 'DM Sans', sans-serif; font-size: 14px; border-radius: 2px; outline: none; transition: border-color 0.2s; appearance: none; cursor: pointer; }
    .field select:focus { border-color: var(--accent); }
    textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 16px; font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.7; border-radius: 2px; resize: vertical; min-height: 140px; outline: none; transition: border-color 0.2s; margin-bottom: 8px; }
    textarea:focus { border-color: var(--accent); }
    textarea::placeholder { color: var(--muted); }
    .char-counter { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); text-align: right; margin-bottom: 20px; letter-spacing: 1px; }
    .btn-row { display: flex; gap: 12px; margin-bottom: 0; }
    .btn-generate { flex: 1; background: var(--accent); color: #0d0d0d; border: none; padding: 14px 32px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; cursor: pointer; border-radius: 2px; transition: background 0.2s, transform 0.1s; }
    .btn-generate:hover { background: var(--accent2); }
    .btn-generate:active { transform: scale(0.99); }
    .btn-clear { background: transparent; color: var(--muted); border: 1px solid var(--border); padding: 14px 20px; font-family: 'Bebas Neue', sans-serif; font-size: 16px; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-clear:hover { border-color: var(--danger); color: var(--danger); }
    #output { display: none; animation: fadeUp 0.5s ease both; }
    .output-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 12px; }
    .output-title { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--accent); }
    .output-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); letter-spacing: 1px; margin-top: 4px; }
    .btn-export { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 8px 20px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 2px; cursor: pointer; border-radius: 2px; transition: all 0.2s; }
    .btn-export:hover { background: var(--accent); color: #0d0d0d; }
    .storyboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .scene-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; animation: fadeUp 0.4s ease both; transition: border-color 0.2s, transform 0.2s; }
    .scene-card:hover { border-color: var(--accent2); transform: translateY(-2px); }
    .frame-visual { aspect-ratio: 16/9; background: var(--frame-bg); position: relative; overflow: hidden; border-bottom: 1px solid var(--border); }
    .frame-number { position: absolute; top: 10px; left: 12px; font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: rgba(232,213,163,0.3); letter-spacing: 1px; z-index: 2; }
    .frame-shot-type { position: absolute; bottom: 10px; right: 12px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--accent); background: rgba(13,13,13,0.7); padding: 3px 8px; border-radius: 2px; text-transform: uppercase; z-index: 2; }
    .frame-drawing { position: absolute; inset: 0; }
    .frame-drawing svg { width: 100%; height: 100%; }
    .scene-info { padding: 16px 18px; }
    .scene-title { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 1px; color: var(--text); margin-bottom: 8px; }
    .scene-description { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .scene-meta { display: flex; gap: 8px; flex-wrap: wrap; }
    .meta-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1px; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; }
    .tag-transition { background: rgba(126,200,160,0.1); color: var(--green); border: 1px solid rgba(126,200,160,0.2); }
    .tag-camera { background: rgba(232,213,163,0.08); color: var(--accent); border: 1px solid rgba(232,213,163,0.15); }
    .tag-duration { background: rgba(122,117,112,0.1); color: var(--muted); border: 1px solid var(--border); }
    .scene-ambiente { margin-top: 8px; font-size: 12px; color: var(--muted); opacity: 0.7; }
    @media print {
      body { background: white; color: black; }
      header, .input-section, .btn-export { display: none !important; }
      .scene-card { border: 1px solid #ccc; break-inside: avoid; page-break-inside: avoid; }
      .frame-visual { background: #f0f0f0; }
      #output { display: block !important; }
      .print-header { display: block !important; margin-bottom: 20px; }
    }
    .print-header { display: none; font-family: 'DM Sans', sans-serif; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 20px; }
    .print-header h2 { font-size: 24px; margin-bottom: 4px; }
    .print-header p { font-size: 12px; color: #666; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @media (max-width: 768px) { main { padding: 40px 20px; } header { padding: 16px 20px; } .input-row { grid-template-columns: 1fr; } .storyboard-grid { grid-template-columns: 1fr; } .btn-row { flex-direction: column; } }
  </style>
</head>
<body>
<header>
  <div class="logo">StoryFrame <span>v1.0</span></div>
  <div class="header-badge">IPVC · ESTG · ECGM</div>
</header>
<main>
  <div class="hero">
    <h1>GERA O TEU<br><em>STORYBOARD</em></h1>
    <p>Descreve a tua narrativa e o sistema estrutura automaticamente as cenas, enquadramentos e transições cinematográficas.</p>
  </div>
  <div class="input-section">
    <div class="input-row">
      <div class="field">
        <label>Género</label>
        <select id="genre">
          <option value="cinematografico">Cinematográfico</option>
          <option value="documental">Documental</option>
          <option value="publicidade">Publicidade</option>
          <option value="videoclip">Videoclip</option>
          <option value="animacao">Animação</option>
          <option value="videojogo">Videojogo / Cutscene</option>
          <option value="serie">Série TV</option>
          <option value="curtametragem">Curta-Metragem</option>
          <option value="institucional">Institucional</option>
        </select>
      </div>
      <div class="field">
        <label>Número de Cenas</label>
        <select id="numScenes">
          <option value="4">4 cenas</option>
          <option value="6" selected>6 cenas</option>
          <option value="8">8 cenas</option>
          <option value="10">10 cenas</option>
        </select>
      </div>
    </div>
    <textarea id="narrative" placeholder="Ex: Uma detetive recebe uma carta misteriosa escrita por ela mesma há 20 anos, descrevendo com detalhe o crime que está a investigar hoje..." oninput="updateCounter()"></textarea>
    <div class="char-counter"><span id="charCount">0</span> / 500 CARACTERES</div>
    <div class="btn-row">
      <button class="btn-generate" onclick="generateStoryboard()">GERAR STORYBOARD</button>
      <button class="btn-clear" onclick="clearForm()">LIMPAR</button>
    </div>
  </div>

  <div id="output">
    <div class="print-header">
      <h2 id="printTitle">STORYBOARD</h2>
      <p id="printMeta"></p>
    </div>
    <div class="output-header">
      <div>
        <div class="output-title">STORYBOARD</div>
        <div class="output-meta" id="outputMeta"></div>
      </div>
      <button class="btn-export" onclick="window.print()">EXPORTAR / IMPRIMIR</button>
    </div>
    <div class="storyboard-grid" id="storyboardGrid"></div>
  </div>
</main>

function updateCounter() {
  var val = document.getElementById('narrative').value;
  document.getElementById('charCount').textContent = val.length;
}

function clearForm() {
  document.getElementById('narrative').value = '';
  document.getElementById('charCount').textContent = '0';
  document.getElementById('genre').selectedIndex = 0;
  document.getElementById('numScenes').selectedIndex = 1;
  document.getElementById('output').style.display = 'none';
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function pickBias(arr, biasIndices) {
  if (Math.random() < 0.7 && biasIndices && biasIndices.length > 0) {
    return arr[biasIndices[Math.floor(Math.random() * biasIndices.length)]];
  }
  return pick(arr);
}

function extractKeywords(text) {
  var lower = text.toLowerCase();
  return {
    hasAction: /luta|guerra|combate|correr|fugir|perseguição|explosão|ataque|batalha/.test(lower),
    hasMystery: /mistério|segredo|descobrir|esconder|sombra|oculto|revelação|investigar/.test(lower),
    hasEmotion: /amor|saudade|tristeza|alegria|medo|emoção|sentimento|chorar|sorrir/.test(lower),
    hasScifi: /espaço|robô|futuro|tecnologia|nave|planeta|astronauta|digital|virtual/.test(lower)
  };
}

      'Comparação visual que demonstra o benefício principal, composição clara e direta.'

  } else if (genre === 'videoclip') {

function generateStoryboard() {
  var narrative = document.getElementById('narrative').value.trim();
  var genre = document.getElementById('genre').value;
  var numScenes = parseInt(document.getElementById('numScenes').value);

  if (!narrative) { alert('Escreve uma narrativa primeiro.'); return; }

  var keywords = extractKeywords(narrative);
  var structures = SCENE_STRUCTURES[genre] || SCENE_STRUCTURES['cinematografico'];
  var ambientes = AMBIENTES[genre] || AMBIENTES['cinematografico'];
  var genreLabels = {
    cinematografico: 'CINEMATOGRÁFICO', documental: 'DOCUMENTAL', publicidade: 'PUBLICIDADE',
    videoclip: 'VIDEOCLIP', animacao: 'ANIMAÇÃO', videojogo: 'VIDEOJOGO',
    serie: 'SÉRIE TV', curtametragem: 'CURTA-METRAGEM', institucional: 'INSTITUCIONAL'
  };

  var cenas = [];
  for (var i = 0; i < numScenes; i++) {
    var structIdx = Math.floor((i / numScenes) * structures.length);
    var struct = structures[structIdx] || structures[structures.length - 1];
    cenas.push({
      numero: i + 1,
      titulo: pick(SCENE_TITLES[struct.role] || ['Cena ' + (i + 1)]),
      descricao: generateDescription(keywords, struct.role, genre, i, numScenes),
      tipo_plano: pickBias(SHOT_TYPES, struct.shotBias),
      movimento_camara: pickBias(CAMERA_MOVES, struct.moveBias),
      transicao: pickBias(TRANSITIONS, struct.transBias),
      duracao: pickBias(DURATIONS, struct.durBias),
      ambiente: ambientes[i % ambientes.length]
    });
  }

  renderStoryboard({ cenas: cenas }, genre, genreLabels[genre], narrative);
}

function getSVGForScene(shotType) {
  return shotSVGs[shotType] || shotSVGs['Plano Médio'];
}

function renderStoryboard(data, genre, genreLabel, narrative) {
  var grid = document.getElementById('storyboardGrid');
  var output = document.getElementById('output');
  var meta = document.getElementById('outputMeta');
  var dateStr = new Date().toLocaleDateString('pt-PT');

  grid.innerHTML = '';
  meta.textContent = data.cenas.length + ' CENAS · ' + genreLabel + ' · ' + dateStr;
  document.getElementById('printTitle').textContent = narrative.substring(0, 60) + (narrative.length > 60 ? '...' : '');
  document.getElementById('printMeta').textContent = data.cenas.length + ' cenas · ' + genreLabel + ' · ' + dateStr;

  data.cenas.forEach(function(cena, i) {
    var card = document.createElement('div');
    card.className = 'scene-card';
    card.style.animationDelay = (i * 0.07) + 's';
    card.innerHTML =
      '<div class="frame-visual">' +
        '<div class="frame-number">' + String(cena.numero).padStart(2,'0') + '</div>' +
        '<div class="frame-drawing">' + getSVGForScene(cena.tipo_plano) + '</div>' +
        '<div class="frame-shot-type">' + cena.tipo_plano + '</div>' +
      '</div>' +
      '<div class="scene-info">' +
        '<div class="scene-title">' + cena.titulo + '</div>' +
        '<div class="scene-description">' + cena.descricao + '</div>' +
        '<div class="scene-meta">' +
          '<span class="meta-tag tag-transition">' + cena.transicao + '</span>' +
          '<span class="meta-tag tag-camera">' + cena.movimento_camara + '</span>' +
          '<span class="meta-tag tag-duration">' + cena.duracao + '</span>' +
        '</div>' +
        '<div class="scene-ambiente">💡 ' + cena.ambiente + '</div>' +
      '</div>';
    grid.appendChild(card);
  });

  output.style.display = 'block';
  output.scrollIntoView({ behavior: 'smooth' });
}
